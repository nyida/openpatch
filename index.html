cat > index.html <<'EOF'
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Multi-Model Chat (Ollama, Free)</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial, sans-serif; padding: 16px; max-width: 980px; margin: 0 auto; }
    input { width: min(520px, 100%); font-size: 16px; padding: 8px; }
    button { font-size: 16px; padding: 8px 12px; margin-left: 8px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 14px; }
    @media (min-width: 900px){ .grid { grid-template-columns: 1fr 1fr; } }
    .card { padding: 12px; background: #f6f6f6; border-radius: 12px; border: 1px solid #e6e6e6; }
    .title { font-weight: 700; margin-bottom: 8px; }
    pre { white-space: pre-wrap; margin: 0; }
    .small { font-size: 13px; opacity: 0.85; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Multi-Model Chat (FIVE MODELS ✅)</h2>

  <div>
    <input id="q" placeholder="Ask something..." />
    <button onclick="compare()">Compare</button>
  </div>

  <div class="small" id="status">Status: ready</div>

  <div class="grid" id="cards"></div>

  <script>
    const OLLAMA = "http://127.0.0.1:11434";

    // ✅ 5 models
    const MODELS = [
      "mistral:latest",
      "llama3:latest",
      "llama3.1:latest",
      "qwen2.5:latest",
      "gemma:latest"
    ];

    function setStatus(s){ document.getElementById("status").textContent = "Status: " + s; }

    function safeId(model){
      return "m_" + model.replace(/[^a-zA-Z0-9]+/g, "_");
    }

    async function askModel(model, prompt){
      const r = await fetch(OLLAMA + "/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model, prompt, stream: false })
      });
      if(!r.ok) throw new Error("Ollama error for " + model);
      const data = await r.json();
      return (data.response || "").trim();
    }

    async function compare(){
      const q = document.getElementById("q").value.trim();
      if(!q) return;

      const cards = document.getElementById("cards");
      cards.innerHTML = "";
      for(const model of MODELS){
        const div = document.createElement("div");
        div.className = "card";
        div.id = safeId(model);
        div.innerHTML = `<div class="title">${model}</div><pre>(waiting)</pre>`;
        cards.appendChild(div);
      }

      setStatus("asking models (first run can be slow)…");

      await Promise.all(MODELS.map(async (model) => {
        const card = document.getElementById(safeId(model));
        card.querySelector("pre").textContent = "Thinking...";
        try{
          const ans = await askModel(model, q);
          card.querySelector("pre").textContent = ans || "(empty response)";
        }catch(e){
          card.querySelector("pre").textContent =
            "Error. Is Ollama running on 127.0.0.1:11434?\n" + String(e);
        }
      }));

      setStatus("done");
    }

    // Enter key to submit
    document.getElementById("q").addEventListener("keydown", (e) => {
      if (e.key === "Enter") compare();
    });
  </script>
</body>
</html>
EOF
